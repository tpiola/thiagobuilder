<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- SEO fallback (overridden at runtime per-page via seo.ts) -->
    <title>Piola Builder — IA e Automação para Negócios Locais</title>
    <meta name="description" content="Sistema de aquisição e automação para negócios locais: mais leads qualificados, mais agenda cheia, menos desperdício." />
    <link rel="canonical" href="https://piolabuilder.com" />

    <!-- Theme & color -->
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="light" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Piola Builder" />
    <meta property="og:title" content="Piola Builder — IA e Automação para Negócios Locais" />
    <meta property="og:description" content="Sistema de aquisição e automação para negócios locais: mais leads qualificados, mais agenda cheia, menos desperdício." />
    <meta property="og:url" content="https://piolabuilder.com" />
    <meta property="og:image" content="https://piolabuilder.com/og-image.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Piola Builder — IA e Automação para Negócios Locais" />
    <meta name="twitter:description" content="Mais leads qualificados, mais agenda cheia — com IA e automação." />
    <meta name="twitter:image" content="https://piolabuilder.com/og-image.png" />

    <!-- Performance: preconnect for Google Maps (used in MapSection) -->
    <link rel="preconnect" href="https://maps.googleapis.com" />
    <link rel="preconnect" href="https://maps.gstatic.com" crossorigin />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
